version: "3.1"

intents:
  - greet
  - stress_academic
  - anxiety
  - motivation
  - self_confidence
  - loneliness
  - sleep_problem
  - depression_symptom
  - ask_tips
  - consultation
  - gratitude
  - goodbye
  - inform

slots:
  last_topic:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

# =========================
# ACTIONS (WAJIB TAMBAH INI)
# =========================
actions:
  - action_stress_advice
  - action_anxiety_advice

responses:

# =========================
# GREETING
# =========================
  utter_greet:
    - text: "Halo 😊 aku di sini kalau kamu mau cerita."
    - text: "Hai, santai aja ya… kamu lagi ngerasa apa sekarang?"
    - text: "Halo, aku siap dengerin kamu."
    - text: "Hey 👋 lagi pengen cerita apa hari ini?"
    - text: "Halo, gak perlu dipendem sendiri ya."

# =========================
# MOTIVATION
# =========================
  utter_motivation:
    - text: "Kamu sudah jauh banget sampai titik ini."
    - text: "Pelan-pelan nggak apa-apa, yang penting jalan."
    - text: "Hari berat itu wajar, kamu tetap bertahan sampai sekarang."
    - text: "Kamu nggak gagal, kamu lagi proses."
    - text: "Satu langkah kecil hari ini juga sudah cukup."
    - text: "Kamu lebih kuat dari yang kamu kira."

# =========================
# SELF CONFIDENCE
# =========================
  utter_self_confidence:
    - text: "Nggak pede itu manusiawi kok."
    - text: "Kamu nggak harus sempurna buat dianggap mampu."
    - text: "Kamu tetap berharga walaupun lagi ngerasa kurang."
    - text: "Rasa ragu itu nggak mendefinisikan kamu."
    - text: "Kamu lebih capable dari yang kamu pikirkan."

# =========================
# LONELINESS
# =========================
  utter_loneliness:
    - text: "Kesepian itu berat, aku ngerti."
    - text: "Aku ada di sini nemenin kamu."
    - text: "Kamu nggak harus ngelewatin ini sendirian."
    - text: "Kalau mau cerita, aku dengerin pelan-pelan ya."
    - text: "Aku di sini, kamu aman buat cerita."

# =========================
# SLEEP PROBLEM
# =========================
  utter_sleep_problem:
    - text: "Tidur yang berantakan bisa bikin semuanya terasa lebih berat."
    - text: "Coba pelan-pelan atur ritme tidur kamu lagi."
    - text: "Kadang pikiran yang penuh bikin susah tidur."
    - text: "Nggak harus langsung sempurna, pelan aja."
    - text: "Coba kurangi HP sebelum tidur ya."

# =========================
# DEPRESSION SYMPTOM
# =========================
  utter_depression_symptom:
    - text: "Aku denger ini cukup berat buat kamu."
    - text: "Kamu nggak harus ngelewatin ini sendirian."
    - text: "Kalau ini terus berlanjut, ngobrol sama profesional bisa membantu."
    - text: "Kamu tetap berarti walaupun lagi ngerasa kosong."
    - text: "Kamu layak dapat bantuan dan dukungan."

# =========================
# ASK TIPS
# =========================
  utter_ask_tips:
    - text: "Kamu lagi butuh bantuan di bagian apa?"
    - text: "Boleh, kamu mau tips soal apa?"
    - text: "Oke, kita cari cara yang cocok buat kamu."

# =========================
# CONSULTATION
# =========================
  utter_consultation:
    - text: "Kamu bisa coba ke psikolog kampus atau layanan konseling."
    - text: "Nggak ada salahnya cari bantuan profesional."
    - text: "Itu justru langkah yang berani."

# =========================
# GRATITUDE
# =========================
  utter_gratitude:
    - text: "Sama-sama 😊 aku senang bisa bantu kamu."
    - text: "Makasih juga sudah cerita."
    - text: "Aku selalu di sini kalau kamu butuh."

# =========================
# GOODBYE
# =========================
  utter_goodbye:
    - text: "Sampai ketemu lagi ya 😊"
    - text: "Jaga diri baik-baik."
    - text: "Kalau butuh cerita lagi, aku ada."
    - text: "Semoga harimu lebih ringan."

# =========================
# DEFAULT FALLBACK (BIAR TIDAK ERROR LAGI)
# =========================
  utter_default:
    - text: "Maaf, aku belum paham. Bisa kamu jelaskan sedikit lebih jelas?"
    - text: "Aku ingin bantu kamu, tapi boleh ceritakan lagi?"