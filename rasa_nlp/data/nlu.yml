version: "3.1"

nlu:

# =========================
# GREET
# =========================
- intent: greet
  examples: |
    - halo
    - hai
    - selamat pagi
    - selamat siang
    - selamat malam
    - halo chatbot
    - hai aku ingin cerita
    - hai apa kabar

# =========================
# STRESS ACADEMIC
# =========================
- intent: stress_academic
  examples: |
    - saya stres karena tugas
    - deadline menumpuk
    - saya burnout
    - saya kewalahan kuliah
    - skripsi membuat saya stres
    - tugas saya terlalu banyak
    - saya capek dengan kuliah
    - saya tertekan dengan tugas

# =========================
# ANXIETY
# =========================
- intent: anxiety
