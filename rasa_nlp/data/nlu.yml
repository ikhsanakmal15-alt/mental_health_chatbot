    - saya cemas
    - saya takut masa depan
    - saya overthinking
    - saya gelisah
    - saya panik
    - saya takut gagal
    - saya takut presentasi
    - saya khawatir berlebihan

# =========================
# MOTIVATION
# =========================
- intent: motivation
  examples: |
    - saya kehilangan semangat
    - saya ingin menyerah
    - saya tidak termotivasi
    - saya merasa gagal
    - saya butuh motivasi
    - saya tidak punya semangat
    - saya merasa lelah

# =========================
# SELF CONFIDENCE
# =========================
- intent: self_confidence
